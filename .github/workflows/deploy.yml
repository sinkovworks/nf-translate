name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inject API key
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          sed -i "s|__CLAUDE_API_KEY__|$CLAUDE_API_KEY|g" index.html
          sed -i "s|__CLAUDE_API_KEY__|$CLAUDE_API_KEY|g" translator.html
      - name: Verify injection
        run: |
          for file in index.html translator.html; do
            if grep -q '__CLAUDE_API_KEY__' "$file"; then
              echo "ERROR: Placeholder was not replaced in $file"
              exit 1
            else
              echo "✓ API key injected successfully in $file"
            fi
          done
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
