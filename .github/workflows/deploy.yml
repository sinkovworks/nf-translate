name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug secret availability
        run: |
          if [ -z "${{ secrets.CLAUDE_API_KEY }}" ]; then
            echo "ERROR: CLAUDE_API_KEY secret is empty or not accessible"
            exit 1
          else
            echo "✓ CLAUDE_API_KEY secret is available (length: ${#CLAUDE_API_KEY})"
          fi
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

      - name: Inject API key
        run: |
          sed -i "s|__CLAUDE_API_KEY__|${{ secrets.CLAUDE_API_KEY }}|g" nf-translate/translator.html

      - name: Verify injection
        run: |
          if grep -q '__CLAUDE_API_KEY__' nf-translate/translator.html; then
            echo "ERROR: Placeholder was not replaced. Check that CLAUDE_API_KEY secret is set."
            exit 1
          else
            echo "✓ API key injected successfully"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: nf-translate

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
