name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug secret availability
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          if [ -z "$CLAUDE_API_KEY" ]; then
            echo "ERROR: CLAUDE_API_KEY secret is empty or not accessible"
            exit 1
          else
            echo "✓ CLAUDE_API_KEY secret is available"
          fi

      - name: Check placeholder exists before injection
        run: |
          if grep -q '__CLAUDE_API_KEY__' nf-translate/translator.html; then
            echo "✓ Placeholder found in file"
          else
            echo "ERROR: Placeholder __CLAUDE_API_KEY__ not found in nf-translate/translator.html"
            echo "File path contents check:"
            ls -la nf-translate/
            exit 1
          fi

      - name: Inject API key
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          sed -i "s|__CLAUDE_API_KEY__|$CLAUDE_API_KEY|g" nf-translate/translator.html

      - name: Verify injection
        run: |
          if grep -q '__CLAUDE_API_KEY__' nf-translate/translator.html; then
            echo "ERROR: Placeholder was not replaced."
            exit 1
          else
            echo "✓ API key injected successfully"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: nf-translate

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
